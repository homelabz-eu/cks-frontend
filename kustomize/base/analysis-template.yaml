apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: cypress-tests-cks-frontend
spec:
  args:
    - name: app-name
    - name: app-url
    - name: environment
      value: "dev"
  metrics:
    - name: cypress-tests
      provider:
        job:
          spec:
            backoffLimit: 1
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: cypress
                    image: cypress/included:13.6.4
                    workingDir: /e2e
                    command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        echo "Running Cypress tests for {{args.app-name}} at {{args.app-url}}"

                        # Clone the demo-apps repository
                        apt-get update -o Acquire::AllowInsecureRepositories=true || true
                        apt-get install -y git --allow-unauthenticated
                        git clone https://github.com/homelabz-eu/demo-apps.git /demo-apps
                        cd /demo-apps

                        # Install dependencies
                        npm ci

                        # Run Cypress tests
                        npx cypress run \
                          --spec "cypress/e2e/{{args.app-name}}.cy.js" \
                          --env CKS_FRONTEND_URL={{args.app-url}},TEST_ENV={{args.environment}} \
                          --config baseUrl={{args.app-url}}

                        # Check exit code
                        EXIT_CODE=$?
                        if [ $EXIT_CODE -eq 0 ]; then
                          echo "✓ Cypress tests passed"
                          exit 0
                        else
                          echo "✗ Cypress tests failed"
                          exit 1
                        fi
                    env:
                      - name: CYPRESS_CACHE_FOLDER
                        value: /tmp/.cache/Cypress

name: PR Ephemeral Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  ephemeral:
    uses: homelabz-eu/pipelines/.github/workflows/ephemeral-environment.yml@main
    with:
      image-name: library/cks-frontend
      dev-hostname-placeholder: dev.cks.homelabz.eu
      deployment-name: cks-frontend
      cypress-spec: cypress/e2e/cks-frontend.cy.js
      cypress-env-key: CKS_FRONTEND_URL
    secrets: inherit # pragma: allowlist secret
